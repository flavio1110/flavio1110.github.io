# Build-only check for the hugo-migration branch and PRs into it. Catches
# broken templates/content before they land. Deploys nothing — production
# deploys happen from `master` via hugo-deploy.yml.
# Pinned HUGO_VERSION below must match the pin documented at the top of
# config/_default/hugo.toml (and the Makefile).
name: Hugo CI

on:
  push:
    branches: ["hugo-migration"]
  pull_request:
    branches: ["hugo-migration"]

env:
  # Keep in sync with the pin comment at the top of config/_default/hugo.toml.
  HUGO_VERSION: 0.164.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo
        run: |
          curl -L -o hugo.deb "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i hugo.deb
          hugo version

      - name: Build
        run: hugo --minify --gc --printPathWarnings -e production
